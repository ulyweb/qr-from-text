<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR Web App</title>
  <meta name="description" content="Generate and decode QR codes entirely in your browser.">
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"QR Web App","short_name":"QR App","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#3b82f6","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%233b82f6%22/%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <style>
    :root { color-scheme: light dark; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .drag-over { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
    #videoPreview { transform: scaleX(-1); } /* Mirror camera */
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
  <main class="max-w-3xl mx-auto px-4 py-8">
    <header class="mb-6 flex justify-between items-start">
      <div>
        <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">QR Web App</h1>
        <p class="text-sm sm:text-base text-gray-600 dark:text-gray-400 mt-1">
          Generate, decode, and share. Fully offline.
        </p>
      </div>
      <button id="btnTheme" class="p-2 rounded-xl bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
        🌓 Theme
      </button>
    </header>

    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 sm:p-6 space-y-4">
      <div class="flex justify-between items-center mb-2">
        <label for="text" class="block text-sm font-medium">Text to encode (or Drag & Drop a .txt file)</label>
        <select id="templateSelect" class="text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-1">
          <option value="">-- Insert Template --</option>
          <option value="WIFI:T:WPA;S:NetworkName;P:Password;H:false;;">Wi-Fi</option>
          <option value="BEGIN:VCARD&#10;VERSION:3.0&#10;N:Lastname;Firstname&#10;FN:Firstname Lastname&#10;TEL:123456789&#10;EMAIL:email@example.com&#10;END:VCARD">vCard</option>
          <option value="mailto:someone@example.com?subject=Hello">Mailto</option>
          <option value="geo:40.7128,-74.0060">Geolocation</option>
        </select>
      </div>
      
      <div>
        <textarea id="text" class="mono w-full h-40 sm:h-48 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
          placeholder="Paste text, apply a template, or drag a text file here"></textarea>
        
        <div class="mt-3 flex flex-wrap gap-2 items-center">
          <button id="btnPaste" class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm transition-colors">📋 Paste</button>
          <button id="btnClear" class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm transition-colors">🗑 Clear</button>
          <span class="text-gray-400 mx-2">|</span>
          <label class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm cursor-pointer transition-colors">
            📁 Upload QR Image
            <input type="file" id="fileInput" accept="image/*" class="hidden">
          </label>
          <button id="btnScan" class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm transition-colors">📷 Scan Camera</button>
        </div>
      </div>

      <div id="cameraContainer" class="hidden flex flex-col items-center border border-gray-300 dark:border-gray-700 p-2 rounded-xl bg-gray-50 dark:bg-gray-900">
        <video id="videoPreview" class="w-full max-w-sm rounded-lg" playsinline></video>
        <button id="btnStopScan" class="mt-2 px-4 py-1 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm">Stop Camera</button>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 pt-4 border-t border-gray-100 dark:border-gray-700">
        <div>
          <label class="block text-sm mb-1">Output</label>
          <select id="outType" class="w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-2">
            <option value="png">PNG (Canvas)</option>
            <option value="svg">SVG (Vector)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">Error correction</label>
          <select id="ecLevel" class="w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-2">
            <option value="L">L (Low)</option>
            <option value="M" selected>M (Medium)</option>
            <option value="Q">Q (Quartile)</option>
            <option value="H">H (High)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">Margin</label>
          <input id="margin" type="number" min="0" max="8" value="2" class="w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-2" />
        </div>
        <div>
          <label class="block text-sm mb-1">Scale</label>
          <input id="scale" type="number" min="2" max="20" value="8" class="w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-2" />
        </div>
        <div>
          <label class="block text-sm mb-1">Foreground</label>
          <input id="fgColor" type="color" value="#000000" class="w-full h-10 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-1 cursor-pointer" />
        </div>
        <div>
          <label class="block text-sm mb-1">Background</label>
          <input id="bgColor" type="color" value="#ffffff" class="w-full h-10 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 p-1 cursor-pointer" />
        </div>
      </div>

      <div class="flex flex-wrap gap-2 pt-2">
        <button id="btnGenerate" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white transition-colors">Generate QR</button>
        <button id="btnDownload" class="px-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Download</button>
        <button id="btnCopyImage" class="px-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Copy image</button>
        <button id="btnShare" class="px-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Share…</button>
      </div>
    </section>

    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 sm:p-6 mt-6">
      <h2 class="text-lg font-medium mb-4">Preview</h2>
      <div id="preview" class="flex items-center justify-center p-4 bg-gray-50 dark:bg-gray-900 rounded-xl min-h-[260px] overflow-hidden">
        </div>
    </section>

    <footer class="mt-8 flex justify-between items-center text-xs text-gray-500 dark:text-gray-400">
      <span>Made for <span class="font-medium">ulyweb</span>. Everything runs locally.</span>
      <span id="statsDisplay" class="font-mono bg-gray-200 dark:bg-gray-800 px-2 py-1 rounded">Gen: 0 | Dec: 0</span>
    </footer>
  </main>

  <script>
    // --- Elements
    const el = (id) => document.getElementById(id);
    const txt = el('text');
    const outType = el('outType');
    const ecLevel = el('ecLevel');
    const margin = el('margin');
    const scale = el('scale');
    const fgColor = el('fgColor');
    const bgColor = el('bgColor');
    const preview = el('preview');
    const statsDisplay = el('statsDisplay');

    // --- State
    let currentBlob = null;
    let currentFilename = 'qr';
    let scanning = false;
    let videoStream = null;

    // --- Inline Service Worker (PWA Offline Support)
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        const swCode = `
          const CACHE_NAME = 'qr-app-v1';
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => self.clients.claim());
          self.addEventListener('fetch', e => {
            if (e.request.url.startsWith('http')) {
              e.respondWith(
                caches.match(e.request).then(res => res || fetch(e.request).then(fetchRes => {
                  return caches.open(CACHE_NAME).then(cache => {
                    cache.put(e.request, fetchRes.clone());
                    return fetchRes;
                  });
                }))
              );
            }
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
      }
    }

    // --- Analytics Tracking
    function trackAction(action) {
      const stats = JSON.parse(localStorage.getItem('qr_stats') || '{"gen":0,"dec":0}');
      stats[action] = (stats[action] || 0) + 1;
      localStorage.setItem('qr_stats', JSON.stringify(stats));
      statsDisplay.textContent = `Gen: ${stats.gen} | Dec: ${stats.dec}`;
    }

    // --- Theme Management
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('qr_theme', isDark ? 'dark' : 'light');
    }

    // --- Helpers
    function savePrefs() {
      const prefs = {
        outType: outType.value, ecLevel: ecLevel.value, margin: +margin.value,
        scale: +scale.value, fgColor: fgColor.value, bgColor: bgColor.value,
      };
      localStorage.setItem('qr_prefs', JSON.stringify(prefs));
    }
    
    function loadPrefs() {
      // Theme
      if (localStorage.getItem('qr_theme') === 'dark' || (!localStorage.getItem('qr_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
      // Stats
      const stats = JSON.parse(localStorage.getItem('qr_stats') || '{"gen":0,"dec":0}');
      statsDisplay.textContent = `Gen: ${stats.gen} | Dec: ${stats.dec}`;
      
      // Controls
      try {
        const prefs = JSON.parse(localStorage.getItem('qr_prefs') || '{}');
        if (prefs.outType) outType.value = prefs.outType;
        if (prefs.ecLevel) ecLevel.value = prefs.ecLevel;
        if (Number.isFinite(prefs.margin)) margin.value = prefs.margin;
        if (Number.isFinite(prefs.scale)) scale.value = prefs.scale;
        if (prefs.fgColor) fgColor.value = prefs.fgColor;
        if (prefs.bgColor) bgColor.value = prefs.bgColor;
      } catch {}
    }

    function clearPreview() {
      preview.innerHTML = '';
      if (currentBlob) URL.revokeObjectURL(currentBlob);
      currentBlob = null;
    }

    // --- QR Generation
    async function generate() {
      const value = txt.value ?? '';
      if (!value.length) return alert('Please paste or type some text first.');
      
      savePrefs();
      clearPreview();
      trackAction('gen');

      const opts = {
        errorCorrectionLevel: ecLevel.value,
        margin: Math.max(0, parseInt(margin.value || 0, 10)),
        color: { dark: fgColor.value, light: bgColor.value },
        scale: Math.max(2, parseInt(scale.value || 8, 10)),
      };

      currentFilename = (value || 'qr').trim().slice(0, 24).replace(/\s+/g, '-').replace(/[^-\w]+/g, '') || 'qr';

      if (outType.value === 'png') {
        const canvas = document.createElement('canvas');
        canvas.className = 'rounded-lg bg-white w-full max-w-sm object-contain';
        preview.appendChild(canvas);
        await QRCode.toCanvas(canvas, value, opts);
        canvas.toBlob(blob => currentBlob = blob, 'image/png');
      } else {
        const svgText = await QRCode.toString(value, { ...opts, type: 'svg' });
        const div = document.createElement('div');
        div.innerHTML = svgText;
        const svg = div.firstElementChild;
        svg.setAttribute('style', 'background: white; border-radius: 0.5rem; max-width: 100%; height: auto;');
        preview.appendChild(svg);
        currentBlob = new Blob([svgText], { type: 'image/svg+xml' });
      }
    }

    // --- QR Decoding (Image Upload)
    function decodeImage(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width; canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          
          if (code) {
            txt.value = code.data;
            trackAction('dec');
            generate();
          } else {
            alert('Could not find a valid QR code in this image.');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // --- Camera Scanner
    async function startCameraScanner() {
      const container = el('cameraContainer');
      const video = el('videoPreview');
      
      if (scanning) return;
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = videoStream;
        video.setAttribute("playsinline", true);
        video.play();
        container.classList.remove('hidden');
        scanning = true;
        requestAnimationFrame(tick);
      } catch (err) {
        alert('Camera access denied or unavailable.');
      }

      function tick() {
        if (!scanning) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth; canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          
          if (code) {
            txt.value = code.data;
            stopCamera();
            trackAction('dec');
            generate();
            return;
          }
        }
        requestAnimationFrame(tick);
      }
    }

    function stopCamera() {
      scanning = false;
      el('cameraContainer').classList.add('hidden');
      if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    }

    // --- Text File Drag & Drop
    txt.addEventListener('dragover', e => { e.preventDefault(); txt.classList.add('drag-over'); });
    txt.addEventListener('dragleave', () => txt.classList.remove('drag-over'));
    txt.addEventListener('drop', e => {
      e.preventDefault();
      txt.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('text/')) {
        const reader = new FileReader();
        reader.onload = ev => { txt.value = ev.target.result; generate(); };
        reader.readAsText(file);
      }
    });

    // --- Share / Download / Copy
    function download() {
      if (!currentBlob) return alert('Generate a QR first.');
      const ext = outType.value === 'png' ? 'png' : 'svg';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(currentBlob);
      a.download = `${currentFilename}.${ext}`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function copyImage() {
      if (!currentBlob) return alert('Generate a QR first.');
      try {
        const type = outType.value === 'png' ? 'image/png' : 'image/svg+xml';
        await navigator.clipboard.write([new ClipboardItem({ [type]: currentBlob })]);
        el('btnCopyImage').textContent = 'Copied ✅';
        setTimeout(() => (el('btnCopyImage').textContent = 'Copy image'), 1500);
      } catch (e) { alert('Copy failed. Try Download instead.'); }
    }

    async function shareImage() {
      if (!currentBlob) return alert('Generate a QR first.');
      if (!navigator.share) return alert('Web Share API not available.');
      try {
        const file = new File([currentBlob], `${currentFilename}.${outType.value}`, { type: currentBlob.type });
        await navigator.share({ files: [file], title: 'QR Code', text: 'QR generated by ulyweb' });
      } catch (e) {}
    }

    // --- Initialization
    window.addEventListener('DOMContentLoaded', () => {
      registerServiceWorker();
      loadPrefs();
      
      const q = new URLSearchParams(location.search);
      if (q.get('text') || q.get('t')) txt.value = q.get('text') || q.get('t');

      // Bindings
      el('btnTheme').addEventListener('click', toggleTheme);
      el('btnGenerate').addEventListener('click', generate);
      el('btnDownload').addEventListener('click', download);
      el('btnCopyImage').addEventListener('click', copyImage);
      el('btnShare').addEventListener('click', shareImage);
      el('btnClear').addEventListener('click', () => { txt.value = ''; clearPreview(); });
      el('btnPaste').addEventListener('click', async () => {
        try { txt.value = await navigator.clipboard.readText(); generate(); } 
        catch { alert('Paste denied or unavailable.'); }
      });
      el('templateSelect').addEventListener('change', e => {
        if (e.target.value) { txt.value = e.target.value; generate(); e.target.value = ""; }
      });
      el('fileInput').addEventListener('change', e => decodeImage(e.target.files[0]));
      el('btnScan').addEventListener('click', startCameraScanner);
      el('btnStopScan').addEventListener('click', stopCamera);
      
      if (txt.value.trim()) generate();
      txt.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate(); });
    });
  </script>
</body>
</html>
