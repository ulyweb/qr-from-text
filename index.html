<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR from Text • ulyweb</title>
  <meta name="description" content="Paste text to generate a QR code (PNG/SVG). Client-only.">
  <meta name="theme-color" content="#0ea5e9" />

  <!-- PWA links (safe even without SW) -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Tailwind CSS (CDN) - styling only; if this fails, app still works -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <style>
    :root { color-scheme: light dark; }
    .qr-preview { image-rendering: pixelated; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <main class="max-w-3xl mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">QR from Text</h1>
      <p class="text-sm sm:text-base text-gray-600 mt-1">
        Paste text and generate a QR you can download or copy. <span class="text-xs">v<span id="appVersion">1.2.3-core</span></span>
      </p>
      <p id="libStatus" class="text-xs mt-2 text-amber-600">Loading QR library…</p>
    </header>

    <section class="bg-white rounded-2xl shadow p-4 sm:p-6 space-y-4">
      <div>
        <label for="text" class="block text-sm font-medium mb-2">Text to encode</label>
        <textarea id="text" class="mono w-full h-40 sm:h-48 rounded-xl border border-gray-300 bg-white p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Paste your text here (URLs, JSON, Wi‑Fi strings, vCard, etc.)"></textarea>
        <div class="mt-3 flex flex-wrap gap-2">
          <button id="btnClear" class="px-3 py-2 rounded-xl bg-gray-100 hover:bg-gray-200 text-sm">Clear</button>
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm mb-1">Output</label>
          <select id="outType" class="w-full rounded-xl border border-gray-300 bg-white p-2">
            <option value="png">PNG (Canvas)</option>
            <option value="svg">SVG (Vector)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">Error correction</label>
          <select id="ecLevel" class="w-full rounded-xl border border-gray-300 bg-white p-2">
            <option value="L">L (Low)</option>
            <option value="M" selected>M (Medium)</option>
            <option value="Q">Q (Quartile)</option>
            <option value="H">H (High)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">Margin (modules)</label>
          <input id="margin" type="number" min="0" max="8" value="2"
            class="w-full rounded-xl border border-gray-300 bg-white p-2" />
        </div>
        <div>
          <label class="block text-sm mb-1">Scale (px/module)</label>
          <input id="scale" type="number" min="2" max="20" value="8"
            class="w-full rounded-xl border border-gray-300 bg-white p-2" />
        </div>
        <div>
          <label class="block text-sm mb-1">Foreground</label>
          <input id="fgColor" type="color" value="#000000"
            class="w-full h-10 rounded-xl border border-gray-300 bg-white p-1" />
        </div>
        <div>
          <label class="block text-sm mb-1">Background</label>
          <input id="bgColor" type="color" value="#ffffff"
            class="w-full h-10 rounded-xl border border-gray-300 bg-white p-1" />
        </div>
      </div>

      <div class="flex flex-wrap gap-2 pt-2">
        <button id="btnGenerate" class="px-4 py-2 rounded-xl bg-blue-600 text-white opacity-60 cursor-not-allowed" disabled>Generate QR</button>
        <button id="btnDownload" class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200">Download</button>
        <button id="btnCopyImage" class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200">Copy image</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow p-4 sm:p-6 mt-6">
      <h2 class="text-lg font-medium mb-4">Preview</h2>
      <div id="preview" class="flex items-center justify-center p-4 bg-gray-50 rounded-xl min-h-[260px]">
        <!-- Canvas/SVG inserted here -->
      </div>
      <p class="text-xs text-gray-500 mt-3">
        Tip: Use error correction <strong>H</strong> and margin 2–4 for stickers/print; prefer <strong>SVG</strong> for design/print.
      </p>
    </section>
  </main>

  <!-- Robust loader: try jsDelivr, then unpkg -->
  <script>
    (function loadQRLib(urls) {
      const status = document.getElementById('libStatus');
      function tryNext() {
        const url = urls.shift();
        if (!url) {
          status.textContent = 'Failed to load QR library. Your network may block CDNs.';
          status.className = 'text-xs mt-2 text-red-600';
          return;
        }
        const s = document.createElement('script');
        s.src = url;
        s.async = true;
        s.onload = () => {
          status.textContent = 'QR library loaded.';
          status.className = 'text-xs mt-2 text-green-600';
          // enable Generate button
          const btn = document.getElementById('btnGenerate');
          btn.disabled = false;
          btn.classList.remove('opacity-60','cursor-not-allowed');
          btn.classList.add('hover:bg-blue-700');
        };
        s.onerror = () => {
          status.textContent = `Retrying alternate CDN…`;
          tryNext();
        };
        document.head.appendChild(s);
      }
      tryNext();
    })([
      'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js',
      'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js'
    ]);
  </script>

  <!-- Core page logic -->
  <script>
    // If a previous SW is controlling the page, gracefully unregister so cache can't serve stale HTML
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }

    const el = (id) => document.getElementById(id);
    const text = el('text'), outType = el('outType'), ecLevel = el('ecLevel'), margin = el('margin'),
          scale = el('scale'), fgColor = el('fgColor'), bgColor = el('bgColor'),
          preview = el('preview'), btnGenerate = el('btnGenerate'), btnDownload = el('btnDownload'),
          btnCopyImage = el('btnCopyImage'), btnClear = el('btnClear'), libStatus = el('libStatus');

    let currentBlob = null, currentFilename = 'qr';

    function clearPreview() {
      preview.innerHTML = '';
      if (currentBlob) URL.revokeObjectURL(currentBlob);
      currentBlob = null;
    }
    function dataUrlToBlob(dataUrl) {
      const [meta, b64] = dataUrl.split(',');
      const mime = (meta.match(/data:(.*?);base64/)||[])[1] || 'image/png';
      const bytes = atob(b64);
      const buf = new Uint8Array(bytes.length);
      for (let i=0;i<bytes.length;i++) buf[i] = bytes.charCodeAt(i);
      return new Blob([buf], { type: mime });
    }
    function filenameSafeBase(textVal, max = 24) {
      const base = (textVal || 'qr').trim().slice(0, max).replace(/\s+/g, '-').replace(/[^-\w]+/g, '');
      return base || 'qr';
    }

    async function generate() {
      const value = text.value ?? '';
      if (!value.length) { alert('Please paste or type some text first.'); return; }
      clearPreview();

      if (typeof QRCode === 'undefined') {
        alert('QR library failed to load. Check your network and try again.');
        return;
      }

      const opts = {
        errorCorrectionLevel: ecLevel.value || 'M',
        margin: Math.max(0, parseInt(margin.value || 0, 10)),
        color: { dark: fgColor.value || '#000000', light: bgColor.value || '#ffffff' },
        width: undefined,
        scale: Math.max(2, parseInt(scale.value || 8, 10)),
      };
      currentFilename = filenameSafeBase(value);

      try {
        if (outType.value === 'png') {
          const canvas = document.createElement('canvas');
          canvas.className = 'qr-preview rounded-lg bg-white';
          preview.appendChild(canvas);
          await new Promise((res, rej) => QRCode.toCanvas(canvas, value, opts, (err) => err ? rej(err) : res()));
          currentBlob = dataUrlToBlob(canvas.toDataURL('image/png'));
        } else {
          const svgText = await QRCode.toString(value, { ...opts, type: 'svg' });
          const div = document.createElement('div'); div.innerHTML = svgText;
          const svg = div.firstElementChild;
          svg.classList.add('qr-preview'); svg.style.background = 'white'; svg.style.borderRadius = '0.5rem';
          preview.appendChild(svg);
          currentBlob = new Blob([svgText], { type: 'image/svg+xml' });
        }
      } catch (e) {
        console.error('Generate error', e);
        alert('Failed to generate the QR. See console for details.');
      }
    }

    function download() {
      if (!currentBlob) return alert('Generate a QR first.');
      const ext = outType.value === 'png' ? 'png' : 'svg';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(currentBlob);
      a.download = `${currentFilename}.${ext}`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 500);
    }

    async function copyImage() {
      if (!currentBlob) return alert('Generate a QR first.');
      if (!navigator.clipboard || !navigator.clipboard.write) return alert('Clipboard image copy not supported in this browser. Use Download instead.');
      try {
        const item = new ClipboardItem({ [currentBlob.type]: currentBlob });
        await navigator.clipboard.write([item]);
        btnCopyImage.textContent = 'Copied ✅'; setTimeout(() => btnCopyImage.textContent = 'Copy image', 1500);
      } catch {
        alert('Copy failed. Your browser may require HTTPS or permissions.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      btnGenerate.addEventListener('click', generate);
      btnDownload.addEventListener('click', download);
      btnCopyImage.addEventListener('click', copyImage);
      btnClear.addEventListener('click', () => { text.value=''; clearPreview(); text.focus(); });
    });
  </script>
</body>
</html>
