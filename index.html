<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR from Text • ulyweb</title>
  <meta name="description" content="Paste text to generate a QR code (PNG/SVG). Client-only.">
  <meta name="theme-color" content="#0ea5e9" />

  <!-- Optional: icons/manifest (safe even without SW) -->
  <link rel="icon" href="favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Tiny CSS (no CDN) -->
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; background: #f8fafc; color: #0f172a; }
    .container { max-width: 56rem; margin: 0 auto; padding: 2rem 1rem; }
    h1 { margin: 0 0 .25rem; font-size: 1.75rem; font-weight: 600; }
    .muted { color: #64748b; font-size: .9rem; }
    .card { background: #fff; border-radius: 1rem; box-shadow: 0 10px 20px rgba(2,6,23,.06); padding: 1rem; margin-top: 1rem; }
    label { display: block; font-size: .9rem; margin: .5rem 0; }
    textarea { width: 100%; height: 12rem; border: 1px solid #cbd5e1; border-radius: .75rem; padding: .75rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; background: #fff; color: #0f172a; }
    input, select, button { font: inherit; }
    .row { display: grid; gap: .75rem; grid-template-columns: repeat(2, minmax(0,1fr)); }
    @media (min-width: 700px) { .row { grid-template-columns: repeat(3, minmax(0,1fr)); } }
    .field { display: grid; gap: .25rem; }
    .input, .select { width: 100%; border: 1px solid #cbd5e1; border-radius: .75rem; padding: .5rem .65rem; background: #fff; color: #0f172a; }
    .color { height: 2.25rem; }
    .actions { display: flex; gap: .5rem; flex-wrap: wrap; padding-top: .5rem; }
    .btn { padding: .6rem 1rem; border-radius: .75rem; border: 0; cursor: pointer; }
    .btn.primary { background: #2563eb; color: #fff; }
    .btn.primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn.gray { background: #e2e8f0; color: #0f172a; }
    .preview { display: grid; place-items: center; min-height: 260px; background: #f1f5f9; border-radius: .75rem; padding: 1rem; }
    .qr-preview { image-rendering: pixelated; }
  </style>

  <!-- Load the QR library from your own repository (no CDN) -->
  <script src="qrcode.min.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <h1>QR from Text</h1>
      <p class="muted">Paste text and generate a QR you can download or copy. <span class="muted">v<span id="appVersion">1.2.4-local</span></span></p>
      <p id="libStatus" class="muted">QR library: <span id="libState">checking…</span></p>
    </header>

    <section class="card">
      <label for="text">Text to encode</label>
      <textarea id="text" placeholder="Paste your text here (URLs, JSON, Wi‑Fi strings, vCard, etc.)"></textarea>
      <div class="actions">
        <button id="btnClear" class="btn gray" type="button">Clear</button>
      </div>

      <div class="row" style="margin-top:.5rem">
        <div class="field">
          <label>Output</label>
          <select id="outType" class="select">
            <option value="png">PNG (Canvas)</option>
            <option value="svg">SVG (Vector)</option>
          </select>
        </div>
        <div class="field">
          <label>Error correction</label>
          <select id="ecLevel" class="select">
            <option value="L">L (Low)</option>
            <option value="M" selected>M (Medium)</option>
            <option value="Q">Q (Quartile)</option>
            <option value="H">H (High)</option>
          </select>
        </div>
        <div class="field">
          <label>Margin (modules)</label>
          <input id="margin" type="number" min="0" max="8" value="2" class="input" />
        </div>
        <div class="field">
          <label>Scale (px/module)</label>
          <input id="scale" type="number" min="2" max="20" value="8" class="input" />
        </div>
        <div class="field">
          <label>Foreground</label>
          <input id="fgColor" type="color" value="#000000" class="input color" />
        </div>
        <div class="field">
          <label>Background</label>
          <input id="bgColor" type="color" value="#ffffff" class="input color" />
        </div>
      </div>

      <div class="actions">
        <button id="btnGenerate" class="btn primary" type="button" disabled>Generate QR</button>
        <button id="btnDownload" class="btn gray" type="button">Download</button>
        <button id="btnCopyImage" class="btn gray" type="button">Copy image</button>
      </div>
    </section>

    <section class="card" style="margin-top:1rem">
      <h2 style="margin:0 0 .75rem; font-size:1.1rem">Preview</h2>
      <div id="preview" class="preview">
        <!-- Canvas/SVG inserted here -->
      </div>
      <p class="muted" style="margin-top:.5rem">
        Tip: Use error correction <b>H</b> and margin 2–4 for stickers/print; prefer <b>SVG</b> for design/print.
      </p>
    </section>
  </main>

  <script>
    // If an older service worker exists from previous versions, unregister it to prevent cached HTML
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }

    const $ = (id) => document.getElementById(id);
    const el = {
      text: $('text'), outType: $('outType'), ecLevel: $('ecLevel'),
      margin: $('margin'), scale: $('scale'), fgColor: $('fgColor'), bgColor: $('bgColor'),
      btnGenerate: $('btnGenerate'), btnDownload: $('btnDownload'), btnCopyImage: $('btnCopyImage'),
      btnClear: $('btnClear'), preview: $('preview'), libState: $('libState')
    };

    let currentBlob = null, currentFilename = 'qr';

    function setLibState(ok) {
      if (ok) {
        el.libState.textContent = 'loaded from local file';
        el.btnGenerate.disabled = false;
      } else {
        el.libState.textContent = 'NOT loaded (qrcode.min.js missing)';
        el.btnGenerate.disabled = true;
      }
    }

    // Check library
    setLibState(typeof QRCode !== 'undefined');

    function clearPreview() {
      el.preview.innerHTML = '';
      if (currentBlob) URL.revokeObjectURL(currentBlob);
      currentBlob = null;
    }
    function dataUrlToBlob(dataUrl) {
      const [meta, b64] = dataUrl.split(',');
      const mime = (meta.match(/data:(.*?);base64/)||[])[1] || 'image/png';
      const bytes = atob(b64);
      const buf = new Uint8Array(bytes.length);
      for (let i=0;i<bytes.length;i++) buf[i] = bytes.charCodeAt(i);
      return new Blob([buf], { type: mime });
    }
    function filenameSafe(textVal, max = 36) {
      const base = (textVal || 'qr').trim().slice(0, max).replace(/\s+/g, '-').replace(/[^-\w]+/g, '');
      return base || 'qr';
    }

    // Build QR using the QRCode.js model and render PNG/SVG ourselves
    function buildQrModel(value, level) {
      // Create off-DOM QR to access module matrix
      const dummy = document.createElement('div');
      const qr = new QRCode(dummy, {
        text: value,
        width: 256,
        height: 256,
        correctLevel: (function map(level) {
          const L = QRCode.CorrectLevel;
          return { L: L.L, M: L.M, Q: L.Q, H: L.H }[level] || L.M;
        })(level)
      });
      return qr._oQRCode; // QRCodeModel with isDark(r,c) and getModuleCount()
    }

    async function generate() {
      const value = el.text.value ?? '';
      if (!value.length) { alert('Please paste or type some text first.'); return; }
      if (typeof QRCode === 'undefined') { alert('QR library not available.'); return; }

      clearPreview();

      const ec = el.ecLevel.value || 'M';
      const margin = Math.max(0, parseInt(el.margin.value || 0, 10));
      const scale = Math.max(2, parseInt(el.scale.value || 8, 10));
      const fg = el.fgColor.value || '#000000';
      const bg = el.bgColor.value || '#ffffff';
      currentFilename = filenameSafe(value);

      const model = buildQrModel(value, ec);
      const n = model.getModuleCount();
      const size = (n + margin * 2) * scale;

      if (el.outType.value === 'png') {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // background
        ctx.fillStyle = bg; ctx.fillRect(0, 0, size, size);
        // modules
        ctx.fillStyle = fg;
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (model.isDark(r, c)) {
              ctx.fillRect((c + margin) * scale, (r + margin) * scale, scale, scale);
            }
          }
        }
        canvas.className = 'qr-preview';
        el.preview.appendChild(canvas);
        currentBlob = dataUrlToBlob(canvas.toDataURL('image/png'));
      } else {
        // Vector SVG
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
        svg.classList.add('qr-preview');

        // background
        const bgRect = document.createElementNS(svgNS, 'rect');
        bgRect.setAttribute('x', '0'); bgRect.setAttribute('y', '0');
        bgRect.setAttribute('width', String(size)); bgRect.setAttribute('height', String(size));
        bgRect.setAttribute('fill', bg);
        svg.appendChild(bgRect);

        // draw modules as rects (vector)
        const g = document.createElementNS(svgNS, 'g');
        g.setAttribute('fill', fg);
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (model.isDark(r, c)) {
              const x = (c + margin) * scale;
              const y = (r + margin) * scale;
              const rect = document.createElementNS(svgNS, 'rect');
              rect.setAttribute('x', String(x));
              rect.setAttribute('y', String(y));
              rect.setAttribute('width', String(scale));
              rect.setAttribute('height', String(scale));
              g.appendChild(rect);
            }
          }
        }
        svg.appendChild(g);
        el.preview.appendChild(svg);
        const svgText = new XMLSerializer().serializeToString(svg);
        currentBlob = new Blob([svgText], { type: 'image/svg+xml' });
      }
    }

    function download() {
      if (!currentBlob) return alert('Generate a QR first.');
      const ext = el.outType.value === 'png' ? 'png' : 'svg';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(currentBlob);
      a.download = `${currentFilename}.${ext}`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 500);
    }

    async function copyImage() {
      if (!currentBlob) return alert('Generate a QR first.');
      if (!navigator.clipboard || !navigator.clipboard.write) return alert('Clipboard image copy not supported in this browser. Use Download instead.');
      try {
        const item = new ClipboardItem({ [currentBlob.type]: currentBlob });
        await navigator.clipboard.write([item]);
        el.btnCopyImage.textContent = 'Copied ✅'; setTimeout(() => el.btnCopyImage.textContent = 'Copy image', 1500);
      } catch {
        alert('Copy failed. Your browser may require HTTPS or permissions.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      el.btnGenerate.addEventListener('click', generate);
      el.btnDownload.addEventListener('click', download);
      el.btnCopyImage.addEventListener('click', copyImage);
      el.btnClear.addEventListener('click', () => { el.text.value=''; clearPreview(); el.text.focus(); });

      // Enable Generate if library present
      if (typeof QRCode !== 'undefined') el.btnGenerate.disabled = false;
    });
  </script>
</body>
</html>
``
